# /etc/nginx/sites-available/locket
#
# Replace YOUR_DOMAIN with your actual domain (e.g. locket.example.com), then
# symlink this file into sites-enabled. Run certbot AFTER the HTTP block is
# live; certbot will rewrite this file to add the TLS lines below the marked
# section. The version checked into the repo shows the FINAL state — what
# certbot's --nginx plugin would produce — so you can also write it directly
# if you have certs from elsewhere.

# ---- HTTP: ACME challenge + redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenges must be served over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: reverse proxy to gunicorn ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # Certbot writes these on first run. If you generated certs another way,
    # point at your fullchain.pem and privkey.pem.
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS. certbot installs a snippet at /etc/letsencrypt/options-ssl-nginx.conf —
    # include that instead of these lines if you want certbot's recommended config.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — only enable AFTER you're sure the cert is correct, otherwise
    # browsers will refuse to connect for the duration of `max-age`.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # The app sends its own Cookie/Set-Cookie headers; these are sane minimums.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bodies are tiny (login form, restore JSON). Cap to be polite.
    client_max_body_size 1M;

    # Gzip the JSON responses. nginx already gzips text/* by default.
    gzip on;
    gzip_types application/json text/css application/javascript;

    # Static iOS profile is served by Flask but cache it longer than the HTML.
    location = /static/locket.mobileconfig {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Block accidental access to admin from non-allowlisted IPs.
    # Uncomment the deny line and add `allow YOUR_IP;` lines above to lock it down.
    # location /admin {
    #     # allow 1.2.3.4;
    #     # deny all;
    #     proxy_pass http://127.0.0.1:5001;
    #     include /etc/nginx/proxy_params;  # if you have it; otherwise see proxy_set_headers below
    # }

    location / {
        proxy_pass http://127.0.0.1:5001;

        # Pass real client info to Flask. ProxyFix in locket/config.py reads these.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Frontend polls /api/queue/status every 1s with short timeouts —
        # 30s is plenty.
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering so SSE-like long polls (none today, but cheap insurance) flush promptly.
        proxy_buffering off;
    }
}
