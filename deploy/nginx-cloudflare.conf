# /etc/nginx/sites-available/locket  (Cloudflare-fronted variant)
#
# Use this when Cloudflare terminates TLS at the edge and proxies to your VPS.
# Origin listens on plain HTTP — Cloudflare connects over HTTPS-to-HTTP
# (Flexible mode) or plain HTTP if you accept the trade-off. Switch
# Cloudflare → SSL/TLS → "Full" + an Origin Certificate if you want CF↔origin
# to be encrypted; in that case, copy the cert to /etc/ssl/cloudflare/ and
# add a 443 server block alongside this one.
#
# Replace YOUR_DOMAIN below.

# --- Real client IP from Cloudflare ---
# Without this, every request looks like it came from a Cloudflare edge IP.
# These ranges are published by Cloudflare; refresh from
# https://www.cloudflare.com/ips-v4 / ips-v6 if you want to be precise.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1M;

    gzip on;
    gzip_types application/json text/css application/javascript;

    # Optional: only accept traffic from Cloudflare. Uncomment after you've
    # confirmed everything works through CF — otherwise direct curl tests fail.
    # if ($http_cf_connecting_ip = "") { return 403; }

    location = /static/locket.mobileconfig {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:5001;

        # ProxyFix in locket/config.py reads X-Forwarded-Proto to know the
        # client really arrived via HTTPS (Cloudflare → us). Without this the
        # session cookie's Secure flag would prevent it from being sent.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}
